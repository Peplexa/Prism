{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="csrf-token" content="{{ csrf_token }}">
    <title>{% block title %}Prism - News Bias Analysis{% endblock %}</title>

    <!-- Styles -->
    <link rel="stylesheet" href="{% static 'css/main.css' %}">
    {% block extra_css %}{% endblock %}

    <!-- HTMX -->
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
</head>
<body hx-headers='{"X-CSRFToken": "{{ csrf_token }}"}'>
    <!-- Navigation -->
    <nav class="navbar">
        <div class="container">
            <a href="{% url 'web:home' %}" class="navbar-brand">Prism</a>
            <ul class="navbar-nav">
                <li><a href="{% url 'web:home' %}" {% if request.resolver_match.url_name == 'home' %}class="active"{% endif %}>Home</a></li>
                <li><a href="{% url 'web:ideas' %}" {% if request.resolver_match.url_name == 'ideas' %}class="active"{% endif %}>Ideas</a></li>
            </ul>
        </div>
    </nav>

    <!-- Main Content -->
    <main>
        {% block content %}{% endblock %}
    </main>

    <!-- Footer -->
    <footer class="footer">
        <div class="container">
            <p>Prism - See Every Side of the Story</p>
        </div>
    </footer>

    <!-- Scripts -->
    <script src="{% static 'js/main.js' %}"></script>
    {% block extra_js %}{% endblock %}
</body>
</html>
